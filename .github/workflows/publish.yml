name: Publish

# Tag-triggered publish to PyPI via Trusted Publishing (OIDC).
#
# Security posture (for a lightly-used open-source project with a
# single maintainer):
# - Trigger is restricted to tag pushes matching `v*`. Manual runs
#   (`workflow_dispatch`) are not enabled on this workflow, so a
#   compromised PR cannot invoke it.
# - All third-party actions are pinned to full commit SHAs. The
#   trailing `# vX.Y.Z` comment is informational; Dependabot is
#   configured to bump the SHAs via PRs.
# - The publish step runs in the `pypi` GitHub Environment. Configure
#   that environment in repo settings to require manual approval and
#   restrict which branches/tags it's callable from — this is the
#   main control against a malicious contributor pushing a tag.
# - The package version is sourced from pyproject.toml; CI refuses to
#   publish when the tag and pyproject version disagree.
# - `contents: write` is only granted to the release-creation job;
#   `id-token: write` is only granted to the PyPI-publish job; every
#   other job runs with read-only permissions.

on:
  push:
    tags: ["v*"]

# Default: least privilege. Specific jobs opt into more.
permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
      - name: Verify tag matches pyproject.toml version
        id: version
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#v}"
          project_version="$(uv run python -c 'import tomllib, pathlib; print(tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"])')"
          if [ "$tag_version" != "$project_version" ]; then
            echo "::error::Tag $GITHUB_REF_NAME (=$tag_version) does not match pyproject.toml version $project_version"
            exit 1
          fi
          echo "version=$project_version" >> "$GITHUB_OUTPUT"
      - name: Run tests before build
        run: uv sync --locked && uv run pytest
      - name: Build sdist + wheel
        run: uv build
      - name: Produce SBOM (requirements-format)
        # Do NOT write under `dist/`: `pypa/gh-action-pypi-publish`
        # validates every file in `dist/` as a distribution and will
        # fail on a non-wheel/sdist file.
        run: |
          mkdir -p sbom
          uv export --format requirements-txt --no-dev --no-hashes --output-file sbom/requirements.sbom.txt
      - name: Upload distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: distributions
          path: dist/
          if-no-files-found: error
      - name: Upload SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom
          path: sbom/
          if-no-files-found: error

  sign:
    name: Sigstore-sign distributions
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write  # Sigstore OIDC
    steps:
      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: distributions
          path: dist/
      - name: Sign with Sigstore
        uses: sigstore/gh-action-sigstore-python@04cffa1d795717b140764e8b640de88853c92acc # v3.3.0
        with:
          inputs: ./dist/*.tar.gz ./dist/*.whl
      - name: Upload signed distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: signed-distributions
          path: dist/
          if-no-files-found: error

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build, sign]
    environment:
      name: pypi
      url: https://pypi.org/p/pyfinance
    permissions:
      id-token: write  # Trusted Publishing (OIDC → PyPI)
    steps:
      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: distributions
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          # Include neither Sigstore bundles nor the SBOM in the PyPI
          # upload; those are attached to the GitHub Release below.
          packages-dir: dist/
          skip-existing: false
          attestations: true

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build, sign, publish-pypi]
    permissions:
      contents: write  # GitHub Release creation
    steps:
      - name: Download signed distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: signed-distributions
          path: dist/
      - name: Download SBOM
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sbom
          path: sbom/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          name: v${{ needs.build.outputs.version }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/*.tar.gz
            dist/*.whl
            dist/*.sigstore.json
            sbom/requirements.sbom.txt
