# Config is compatible with both prek (https://prek.j178.dev/) and
# pre-commit (https://pre-commit.com). Run locally via `uv run prek
# run --all-files` or `task pre-commit`.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-ast
      - id: check-merge-conflict
      - id: debug-statements
      - id: mixed-line-ending
        args: ["--fix=lf"]
      - id: check-yaml
      - id: check-toml

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff-check
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/astral-sh/ty-pre-commit
    rev: 0.0.31
    hooks:
      - id: ty-check

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.22.0
    hooks:
      - id: markdownlint-cli2
        exclude: "^CHANGELOG\\.md$"
